# ── NexBuild · Deploy to ZeniCloud via Docker Hub (no GCP key required) ──
#
# Alternative to deploy-zenicloud.yml when chairman GCP service account
# JSON is not available. Uses Docker Hub PUBLIC images instead — ZeniCloud
# Cloud Run pulls from Docker Hub directly.
#
# Required GitHub Secrets:
#   DOCKERHUB_USERNAME  — Docker Hub username (e.g. "thienmocduc")
#   DOCKERHUB_TOKEN     — Docker Hub access token (Settings → Security → Access Tokens)
#   ZENI_TOKEN          — ZeniCloud PAT
#   ZENI_DB_URL         — Cloud SQL connection string
#   ZENI_JWT_SECRET     — JWT signing key
#
# Usage: trigger manually via Actions tab → "Deploy to ZeniCloud (Docker Hub)" → Run

name: Deploy to ZeniCloud (Docker Hub)

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - 'public/**'
      - 'Dockerfile'
      - 'Dockerfile.frontend'
      - '.github/workflows/deploy-zenicloud-dockerhub.yml'
  workflow_dispatch:

env:
  ZENI_BASE: https://zenicloud.io/api/v1
  ZENI_WS: nexbuild
  REGION: asia-southeast1
  # Docker Hub repos — public, free
  HUB_API: docker.io/${{ vars.DOCKERHUB_USERNAME || secrets.DOCKERHUB_USERNAME }}/nexbuild-flatform-api
  HUB_WEB: docker.io/${{ vars.DOCKERHUB_USERNAME || secrets.DOCKERHUB_USERNAME }}/nexbuild-flatform-web

jobs:
  # ─────────────────────────────────────────────────────────────
  build-and-push-backend:
    runs-on: ubuntu-latest
    outputs:
      image: ${{ steps.meta.outputs.image }}
    steps:
      - uses: actions/checkout@v4

      - name: Compute metadata
        id: meta
        run: |
          TAG="${GITHUB_SHA:0:7}"
          IMG="${HUB_API}:${TAG}"
          echo "tag=${TAG}" >> $GITHUB_OUTPUT
          echo "image=${IMG}" >> $GITHUB_OUTPUT
          echo "Will push: ${IMG}"

      - name: Login Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Setup Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build + push backend
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ steps.meta.outputs.image }}
            ${{ env.HUB_API }}:latest
          cache-from: type=registry,ref=${{ env.HUB_API }}:buildcache
          cache-to: type=registry,ref=${{ env.HUB_API }}:buildcache,mode=max
          platforms: linux/amd64

  # ─────────────────────────────────────────────────────────────
  build-and-push-frontend:
    runs-on: ubuntu-latest
    outputs:
      image: ${{ steps.meta.outputs.image }}
    steps:
      - uses: actions/checkout@v4

      - name: Compute metadata
        id: meta
        run: |
          TAG="${GITHUB_SHA:0:7}"
          IMG="${HUB_WEB}:${TAG}"
          echo "tag=${TAG}" >> $GITHUB_OUTPUT
          echo "image=${IMG}" >> $GITHUB_OUTPUT

      - name: Login Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Setup Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build + push frontend
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.frontend
          push: true
          tags: |
            ${{ steps.meta.outputs.image }}
            ${{ env.HUB_WEB }}:latest
          cache-from: type=registry,ref=${{ env.HUB_WEB }}:buildcache
          cache-to: type=registry,ref=${{ env.HUB_WEB }}:buildcache,mode=max
          platforms: linux/amd64

  # ─────────────────────────────────────────────────────────────
  deploy-backend:
    needs: build-and-push-backend
    runs-on: ubuntu-latest
    outputs:
      url: ${{ steps.deploy.outputs.url }}
    steps:
      - name: POST /projects (idempotent upsert)
        id: deploy
        env:
          IMAGE: ${{ needs.build-and-push-backend.outputs.image }}
          ZENI_TOKEN: ${{ secrets.ZENI_TOKEN }}
          DB_URL: ${{ secrets.ZENI_DB_URL }}
          JWT_SECRET: ${{ secrets.ZENI_JWT_SECRET }}
        run: |
          set -e
          PAYLOAD=$(jq -n \
            --arg img "$IMAGE" \
            --arg db "$DB_URL" \
            --arg jwt "$JWT_SECRET" \
            --arg zt "$ZENI_TOKEN" \
            '{
              name: "nexbuild-api",
              type: "api",
              runtime: "container",
              size: "m",
              region: "'"$REGION"'",
              image: $img,
              port: 8080,
              allow_unauthenticated: true,
              env_vars: {
                DEBUG: "false",
                ALLOWED_ORIGINS: "[\"https://nexbuild.holdings\",\"https://www.nexbuild.holdings\"]",
                DATABASE_URL: $db,
                REDIS_URL: "redis://localhost:6379/0",
                JWT_SECRET_KEY: $jwt,
                JWT_PRIVATE_KEY_PATH: "nonexistent.pem",
                JWT_PUBLIC_KEY_PATH: "nonexistent.pem",
                ZENI_TOKEN: $zt,
                ZENI_BASE: "'"$ZENI_BASE"'",
                ZENI_WS: "'"$ZENI_WS"'",
                AGENT_MODEL: "gemini-2.5-flash",
                RAG_ENABLED: "1"
              }
            }')
          RES=$(curl -sf -X POST "${ZENI_BASE}/projects?ws=${ZENI_WS}" \
            -H "Authorization: Bearer $ZENI_TOKEN" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD")
          echo "$RES" | jq .
          URL=$(echo "$RES" | jq -r '.domain // .url // empty')
          echo "url=${URL}" >> $GITHUB_OUTPUT
          echo "✅ Backend: ${URL}"

  # ─────────────────────────────────────────────────────────────
  deploy-frontend:
    needs: [build-and-push-frontend, deploy-backend]
    runs-on: ubuntu-latest
    steps:
      - name: POST /projects (frontend with backend URL)
        env:
          IMAGE: ${{ needs.build-and-push-frontend.outputs.image }}
          BACKEND_URL: ${{ needs.deploy-backend.outputs.url }}
          ZENI_TOKEN: ${{ secrets.ZENI_TOKEN }}
        run: |
          set -e
          PAYLOAD=$(jq -n \
            --arg img "$IMAGE" \
            --arg api "$BACKEND_URL" \
            '{
              name: "nexbuild-web",
              type: "web",
              runtime: "container",
              size: "s",
              region: "'"$REGION"'",
              image: $img,
              port: 8080,
              allow_unauthenticated: true,
              env_vars: { API_BACKEND: $api }
            }')
          RES=$(curl -sf -X POST "${ZENI_BASE}/projects?ws=${ZENI_WS}" \
            -H "Authorization: Bearer $ZENI_TOKEN" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD")
          echo "$RES" | jq .
          URL=$(echo "$RES" | jq -r '.domain // .url // empty')
          echo "✅ Frontend: ${URL}"
          echo ""
          echo "Next: bind nexbuild.holdings →"
          echo "  POST ${ZENI_BASE}/projects/<frontend_id>/domain?ws=${ZENI_WS}"
          echo "    body: {\"domain\":\"nexbuild.holdings\"}"
