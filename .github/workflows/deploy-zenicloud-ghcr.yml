# ── NexBuild · Full deploy to ZeniCloud via GitHub Container Registry ────
#
# Goal: 100% production on ZeniCloud Cloud Run, only GitHub for source + build.
# No Docker Hub, no Railway, no Vercel, no chairman GCP key required.
#
# How it works:
#   1. GitHub Actions builds backend + frontend Docker images
#   2. Push to ghcr.io/<owner>/nexbuild-flatform-{api,web}:<sha> (PUBLIC, free)
#   3. POST ZeniCloud /api/v1/projects (idempotent upsert) with ghcr.io image URL
#   4. ZeniCloud Cloud Run pulls + deploys
#
# Required GitHub Secrets:
#   ZENI_TOKEN          — ZeniCloud PAT (already configured)
#   ZENI_DB_URL         — Cloud SQL connection (already configured)
#   ZENI_JWT_SECRET     — JWT signing key (already configured)
# That's it. GHCR auth is automatic via GITHUB_TOKEN.

name: Deploy to ZeniCloud (GHCR)

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - 'public/**'
      - 'Dockerfile'
      - 'Dockerfile.frontend'
      - '.github/workflows/deploy-zenicloud-ghcr.yml'
  workflow_dispatch:

env:
  ZENI_BASE: https://zenicloud.io/api/v1
  ZENI_WS: nexbuild
  REGION: asia-southeast1
  REGISTRY: ghcr.io
  IMAGE_API: ghcr.io/${{ github.repository_owner }}/nexbuild-flatform-api
  IMAGE_WEB: ghcr.io/${{ github.repository_owner }}/nexbuild-flatform-web

permissions:
  contents: read
  packages: write   # Required to push to ghcr.io

jobs:
  # ─────────────────────────────────────────────────────────────
  build-backend:
    runs-on: ubuntu-latest
    outputs:
      image: ${{ steps.meta.outputs.image }}
    steps:
      - uses: actions/checkout@v4

      - name: Compute image tag
        id: meta
        run: |
          TAG="${GITHUB_SHA:0:7}"
          IMG="${IMAGE_API}:${TAG}"
          # Lowercase (ghcr.io requires lowercase)
          IMG_LOWER=$(echo "$IMG" | tr '[:upper:]' '[:lower:]')
          IMG_LATEST=$(echo "${IMAGE_API}:latest" | tr '[:upper:]' '[:lower:]')
          echo "image=${IMG_LOWER}" >> $GITHUB_OUTPUT
          echo "latest=${IMG_LATEST}" >> $GITHUB_OUTPUT

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build + push backend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ steps.meta.outputs.image }}
            ${{ steps.meta.outputs.latest }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64

  # ─────────────────────────────────────────────────────────────
  build-frontend:
    runs-on: ubuntu-latest
    outputs:
      image: ${{ steps.meta.outputs.image }}
    steps:
      - uses: actions/checkout@v4

      - name: Compute image tag
        id: meta
        run: |
          TAG="${GITHUB_SHA:0:7}"
          IMG="${IMAGE_WEB}:${TAG}"
          IMG_LOWER=$(echo "$IMG" | tr '[:upper:]' '[:lower:]')
          IMG_LATEST=$(echo "${IMAGE_WEB}:latest" | tr '[:upper:]' '[:lower:]')
          echo "image=${IMG_LOWER}" >> $GITHUB_OUTPUT
          echo "latest=${IMG_LATEST}" >> $GITHUB_OUTPUT

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build + push frontend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.frontend
          push: true
          tags: |
            ${{ steps.meta.outputs.image }}
            ${{ steps.meta.outputs.latest }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64

  # ─────────────────────────────────────────────────────────────
  deploy-backend:
    needs: build-backend
    runs-on: ubuntu-latest
    outputs:
      url: ${{ steps.deploy.outputs.url }}
      project_id: ${{ steps.deploy.outputs.project_id }}
    steps:
      - name: POST /projects (upsert backend)
        id: deploy
        env:
          IMAGE: ${{ needs.build-backend.outputs.image }}
          ZENI_TOKEN: ${{ secrets.ZENI_TOKEN }}
          DB_URL: ${{ secrets.ZENI_DB_URL }}
          JWT_SECRET: ${{ secrets.ZENI_JWT_SECRET }}
        run: |
          set -e
          PAYLOAD=$(jq -n \
            --arg img "$IMAGE" \
            --arg db "$DB_URL" \
            --arg jwt "$JWT_SECRET" \
            --arg zt "$ZENI_TOKEN" \
            '{
              name: "nexbuild-api",
              type: "api",
              runtime: "container",
              size: "m",
              region: "'"$REGION"'",
              image: $img,
              port: 8080,
              allow_unauthenticated: true,
              env_vars: {
                DEBUG: "false",
                ALLOWED_ORIGINS: "[\"https://nexbuild.holdings\",\"https://www.nexbuild.holdings\"]",
                DATABASE_URL: $db,
                REDIS_URL: "redis://localhost:6379/0",
                JWT_SECRET_KEY: $jwt,
                JWT_PRIVATE_KEY_PATH: "nonexistent.pem",
                JWT_PUBLIC_KEY_PATH: "nonexistent.pem",
                ZENI_TOKEN: $zt,
                ZENI_BASE: "'"$ZENI_BASE"'",
                ZENI_WS: "'"$ZENI_WS"'",
                AGENT_MODEL: "gemini-2.5-flash",
                RAG_ENABLED: "1",
                ESCROW_AUTO_RELEASE_DAYS: "30",
                COMMISSION_SUPPLIER_PCT: "2.5",
                COMMISSION_BOOKING_PCT: "8.0",
                ESCROW_FEE_PCT: "0.5"
              }
            }')
          echo "Posting to ZeniCloud..."
          RES=$(curl -sf -X POST "${ZENI_BASE}/projects?ws=${ZENI_WS}" \
            -H "Authorization: Bearer $ZENI_TOKEN" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD")
          echo "$RES" | jq .
          ID=$(echo "$RES" | jq -r '.id // empty')
          URL=$(echo "$RES" | jq -r '.domain // .url // empty')
          echo "project_id=${ID}" >> $GITHUB_OUTPUT
          echo "url=${URL}" >> $GITHUB_OUTPUT
          echo "✅ Backend deploying at: ${URL}"

  # ─────────────────────────────────────────────────────────────
  deploy-frontend:
    needs: [build-frontend, deploy-backend]
    runs-on: ubuntu-latest
    outputs:
      url: ${{ steps.deploy.outputs.url }}
      project_id: ${{ steps.deploy.outputs.project_id }}
    steps:
      - name: POST /projects (upsert frontend)
        id: deploy
        env:
          IMAGE: ${{ needs.build-frontend.outputs.image }}
          BACKEND_URL: ${{ needs.deploy-backend.outputs.url }}
          ZENI_TOKEN: ${{ secrets.ZENI_TOKEN }}
        run: |
          set -e
          PAYLOAD=$(jq -n \
            --arg img "$IMAGE" \
            --arg api "$BACKEND_URL" \
            '{
              name: "nexbuild-web",
              type: "web",
              runtime: "container",
              size: "s",
              region: "'"$REGION"'",
              image: $img,
              port: 8080,
              allow_unauthenticated: true,
              env_vars: { API_BACKEND: $api }
            }')
          RES=$(curl -sf -X POST "${ZENI_BASE}/projects?ws=${ZENI_WS}" \
            -H "Authorization: Bearer $ZENI_TOKEN" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD")
          echo "$RES" | jq .
          ID=$(echo "$RES" | jq -r '.id // empty')
          URL=$(echo "$RES" | jq -r '.domain // .url // empty')
          echo "project_id=${ID}" >> $GITHUB_OUTPUT
          echo "url=${URL}" >> $GITHUB_OUTPUT
          echo "✅ Frontend deploying at: ${URL}"

  # ─────────────────────────────────────────────────────────────
  summary:
    needs: [build-backend, build-frontend, deploy-backend, deploy-frontend]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Print deployment summary
        run: |
          echo "═══════════════════════════════════════════════════════════"
          echo "  NEXBUILD · ZENICLOUD CLOUD RUN DEPLOY"
          echo "  Commit: ${GITHUB_SHA:0:7}"
          echo "═══════════════════════════════════════════════════════════"
          echo ""
          echo "Images pushed to ghcr.io (PUBLIC):"
          echo "  Backend:  ${{ needs.build-backend.outputs.image }}"
          echo "  Frontend: ${{ needs.build-frontend.outputs.image }}"
          echo ""
          echo "ZeniCloud Cloud Run:"
          echo "  Backend project: ${{ needs.deploy-backend.outputs.project_id }}"
          echo "  Backend URL:     ${{ needs.deploy-backend.outputs.url }}"
          echo "  Frontend project: ${{ needs.deploy-frontend.outputs.project_id }}"
          echo "  Frontend URL:    ${{ needs.deploy-frontend.outputs.url }}"
          echo ""
          echo "Next: bind nexbuild.holdings →"
          echo "  curl -X POST https://zenicloud.io/api/v1/projects/${{ needs.deploy-frontend.outputs.project_id }}/domain?ws=nexbuild \\"
          echo "    -H 'Authorization: Bearer \$ZENI_TOKEN' \\"
          echo "    -d '{\"domain\":\"nexbuild.holdings\"}'"
