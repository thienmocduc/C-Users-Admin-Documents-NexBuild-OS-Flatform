version: "3.8"

services:
  backend:
    build: .
    container_name: nexbuild-api
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      - DATABASE_URL=postgresql+asyncpg://nexbuild:${DB_PASSWORD:-nexbuild123}@postgres:5432/nexbuild
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    volumes:
      - uploads:/app/uploads
      - ./keys:/app/keys:ro

  postgres:
    image: postgres:16-alpine
    container_name: nexbuild-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: nexbuild
      POSTGRES_USER: nexbuild
      POSTGRES_PASSWORD: ${DB_PASSWORD:-nexbuild123}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nexbuild"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: nexbuild-redis
    restart: unless-stopped
    volumes:
      - redisdata:/data

  nginx:
    image: nginx:alpine
    container_name: nexbuild-proxy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - uploads:/var/www/uploads:ro
    depends_on:
      - backend

volumes:
  pgdata:
  redisdata:
  uploads:
